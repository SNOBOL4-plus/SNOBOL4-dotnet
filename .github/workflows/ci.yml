name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build solution
        run: dotnet build Snobol4.sln -c Release -p:EnableWindowsTargeting=true

      - name: Run tests
        run: dotnet test TestSnobol4/TestSnobol4.csproj -c Release --logger "console;verbosity=normal"
